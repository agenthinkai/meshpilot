# ─────────────────────────────────────────────────────────────────────────────
#  MeshPilot — nginx reverse-proxy site config
#
#  ⚠  THIS FILE IS NOT USABLE ON THE CURRENT SERVER AS-IS.
#     88.198.91.81 has NO nginx installed. Ports 80/443 are held by a Caddy
#     container (pitchproof-caddy-1) serving agenthinkmesh.com. Use
#     meshpilot-caddy.conf instead — it is the working equivalent.
#
#     This file is kept for portability: it is what you would use if MeshPilot
#     is ever moved to a host that does run nginx.
#
#  WHERE TO PUT IT (on an nginx host):
#      /etc/nginx/sites-available/meshpilot.conf
#    then enable and reload:
#      ln -s /etc/nginx/sites-available/meshpilot.conf /etc/nginx/sites-enabled/
#      nginx -t && systemctl reload nginx
#
#  TLS: this block is plain HTTP on :80. For HTTPS run
#      certbot --nginx -d meshpilot.agenthinkmesh.com
#  which rewrites this file to add the :443 server and redirect.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name meshpilot.agenthinkmesh.com;

    # Model uploads are large; match MeshPilot's internal nginx limit.
    client_max_body_size 8192m;

    access_log /var/log/nginx/meshpilot-access.log;
    error_log  /var/log/nginx/meshpilot-error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # LLM inference is slow — generation can run well past the 60s default.
        proxy_read_timeout    180s;
        proxy_send_timeout    180s;
        proxy_connect_timeout 30s;

        # Don't buffer token-by-token streaming responses.
        proxy_buffering off;
    }
}
