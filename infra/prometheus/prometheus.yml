global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'meshpilot'

scrape_configs:
  - job_name: 'meshpilot-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'meshpilot-llamacpp'
    static_configs:
      - targets: ['llamacpp:8080']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
