# ─────────────────────────────────────────────────────────────────────────────
#  MeshPilot — Caddy site block  (THIS is the one to use on 88.198.91.81)
#
#  WHERE TO PUT IT:
#      Append to  /opt/pitchproof/infra/Caddyfile
#      Then reload:  cd /opt/pitchproof && docker compose exec -w /etc/caddy caddy \
#                      caddy reload --config /etc/caddy/Caddyfile
#
#  ═══ READ THIS BEFORE YOU RELOAD ═══════════════════════════════════════════
#
#  The running Caddy serves  api.agenthinkmesh.com.
#  The Caddyfile ON DISK does NOT contain that hostname — it only has
#  api.pitchproof.io. The live config exists only in the running container's
#  memory (loaded 2026-06-02; the file was edited afterwards, 2026-07-02).
#
#  So reloading Caddy from the current on-disk file — or rebooting the server —
#  REPLACES the live config and takes api.agenthinkmesh.com OFFLINE. That breaks
#  the API, the cohort dashboard, and the site's backend.
#
#  Therefore: BOTH blocks below must be in the Caddyfile before any reload.
#  The first block restores what is currently running (reconstructed from the
#  live config); the second adds MeshPilot.
#
#  Verify after reloading:
#      curl -s https://api.agenthinkmesh.com/health     -> {"status":"ok",...}
#      curl -sI https://meshpilot.agenthinkmesh.com/    -> 200
#
#  PREREQUISITE: DNS. meshpilot.agenthinkmesh.com does not resolve yet.
#  Create an A record -> 88.198.91.81 BEFORE reloading, or Caddy's certificate
#  request for the new hostname will fail. If the DNS is behind Cloudflare's
#  proxy (orange cloud), set it to DNS-only (grey cloud) so Caddy can complete
#  the HTTP-01 challenge.
# ─────────────────────────────────────────────────────────────────────────────


# ── BLOCK 1 — restores the CURRENTLY RUNNING site. Do not omit. ──────────────
api.agenthinkmesh.com {
    encode gzip

    header {
        Strict-Transport-Security "max-age=31536000; includeSubDomains"
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
        Referrer-Policy "strict-origin-when-cross-origin"
        Permissions-Policy "interest-cohort=()"
    }

    # Stripe webhook needs the raw body — no compression.
    @stripe path /billing/webhook
    handle @stripe {
        reverse_proxy api:8000
    }

    handle {
        reverse_proxy api:8000 {
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-For {remote_host}
        }
    }

    log {
        output file /data/logs/api-access.log {
            roll_size 100mb
            roll_keep 5
        }
        format json
    }
}


# ── BLOCK 2 — MeshPilot ──────────────────────────────────────────────────────
meshpilot.agenthinkmesh.com {
    encode gzip

    header {
        Strict-Transport-Security "max-age=31536000; includeSubDomains"
        X-Content-Type-Options "nosniff"
        Referrer-Policy "strict-origin-when-cross-origin"
    }

    # MeshPilot's nginx is published on the HOST at 127.0.0.1:8100. Caddy runs
    # in a container, so "localhost" there is the container, not the host —
    # host.docker.internal is mapped to the host gateway by the extra_hosts
    # entry added to the caddy service (see README-DEPLOY.md step 8).
    reverse_proxy host.docker.internal:8100 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}

        # LLM inference is slow — allow long generations.
        transport http {
            read_timeout 180s
            write_timeout 180s
            dial_timeout 30s
        }
    }

    # Large model uploads (MeshPilot's own nginx allows 8GB).
    request_body {
        max_size 8GB
    }

    log {
        output file /data/logs/meshpilot-access.log {
            roll_size 100mb
            roll_keep 5
        }
        format json
    }
}
